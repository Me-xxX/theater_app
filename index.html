<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>観劇管理</title>
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="観劇管理">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf7f2;--bg2:#f2ede5;--bg3:#e8e0d4;
  --border:#d4c8b8;--border2:#c0b09a;
  --text:#3a2e22;--text2:#6a5a48;--text3:#9a8a78;
  --accent:#c97060;--accent2:#e8907a;
  --blue:#6090c0;--red:#d04040;
  --radius:10px;--radius-sm:6px;
  --shadow:0 2px 8px rgba(0,0,0,0.08);
}
body{font-family:"Hiragino Kaku Gothic Pro","Meiryo",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:440px;margin:0 auto;padding-bottom:80px}
.tab-bar{display:flex;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.tab{flex:1;padding:10px 2px;font-size:10px;font-weight:600;text-align:center;color:var(--text3);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;letter-spacing:.2px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.pane{display:none;padding:16px}
.pane.active{display:block}
.section-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;letter-spacing:.5px}
.subsection{font-size:11px;font-weight:700;color:var(--text3);margin:14px 0 6px;letter-spacing:.8px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:10px;box-shadow:var(--shadow)}
.card.today-card{border:2px solid #e06050;background:#fffaf9;box-shadow:0 3px 12px rgba(192,64,48,.15)}
.card.tomorrow-card{border:1.5px solid #d4a840;background:#fffdf5;box-shadow:0 2px 8px rgba(180,130,0,.1)}
.card-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px}
.badge.today{background:#fde0d8;color:#b83020}
.badge.tomorrow{background:#fef0c8;color:#9a6810}
.badge.self{background:#ffe0e0;color:var(--red)}
.badge.companion{background:#e0f0e0;color:#408040}
.badge.duplicate{background:#e8e0f0;color:#6040a0}
.badge.past{background:#e8e8e8;color:#888}
.badge.hidden-b{background:#f0e8f8;color:#804898}
label.field{display:block;font-size:11px;font-weight:600;color:var(--text2);margin:10px 0 4px;letter-spacing:.3px}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;color:var(--text);background:#fff;transition:border .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:56px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{display:block;width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--text);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;text-align:center;margin-top:10px;transition:all .2s}
.btn:hover{background:var(--bg2)}
.btn.primary{background:var(--accent);color:#fff;border:none}
.btn.primary:hover{background:var(--accent2)}
.btn.sm{padding:5px 11px;font-size:12px;width:auto;margin-top:0}
.btn.xs{padding:3px 8px;font-size:11px;width:auto;margin-top:0}
.btn.danger{color:var(--red);border-color:#f0c0c0;background:#fff8f8}
.btn.excel{background:#1d6f42;color:#fff;border:none}
.btn.excel:hover{background:#2a8a52}
.btn.seat-btn{background:var(--blue);color:#fff;border:none;font-size:12px;padding:7px}
.btn.bulk-btn{background:#8060b0;color:#fff;border:none;font-size:12px;padding:8px}
.row-flex{display:flex;align-items:center;gap:8px}
.divider{height:1px;background:var(--border);margin:14px 0}
.chips-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{display:inline-flex;align-items:center;padding:5px 11px;border:1px solid var(--border);border-radius:999px;font-size:12px;cursor:pointer;background:#fff;color:var(--text2);transition:all .2s}
.chip.selected{background:var(--text);color:#fff;border-color:var(--text)}
.check-group{display:flex;gap:14px;flex-wrap:wrap;padding:6px 0}
.check-item{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px}
.check-item input[type=radio]{width:15px;height:15px;cursor:pointer;accent-color:var(--accent)}
.seat-container{position:relative;width:100%;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:var(--bg2);min-height:150px}
.seat-img{width:100%;display:block;cursor:zoom-in}
.seat-marker{position:absolute;transform:translate(-50%,-50%);border-radius:50%;border:1.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);z-index:5;pointer-events:none;width:10px;height:10px}
.info-row{display:flex;gap:6px;font-size:13px;margin:3px 0;align-items:flex-start}
.info-label{font-size:11px;font-weight:600;color:var(--text3);min-width:54px;padding-top:1px}
.del-btn{font-size:11px;color:var(--red);cursor:pointer;background:none;border:none;padding:2px 5px;font-family:inherit;flex-shrink:0}
.hide-btn{font-size:11px;color:#804898;cursor:pointer;background:none;border:none;padding:2px 5px;font-family:inherit;flex-shrink:0}
.edit-btn{font-size:11px;color:var(--blue);cursor:pointer;background:none;border:none;padding:2px 5px;font-family:inherit;flex-shrink:0}
.upload-area{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:13px;text-align:center;font-size:13px;color:var(--text3);cursor:pointer;transition:all .2s}
.upload-area:hover{background:var(--bg2);border-color:var(--accent)}
.empty{text-align:center;padding:2rem 1rem;color:var(--text3);font-size:13px}
.loading{text-align:center;padding:2rem;color:var(--text3);font-size:13px}
.filter-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:10px}
/* モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;flex-direction:column;align-items:center;justify-content:center;touch-action:none}
.modal-overlay.open{display:flex}
.modal-close{position:fixed;top:14px;right:16px;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:22px;cursor:pointer;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;z-index:1002;touch-action:manipulation}
.pinch-container{position:relative;overflow:hidden;width:92vw;max-height:80vh;display:flex;align-items:center;justify-content:center;border-radius:var(--radius)}
#modal-inner{position:relative;transform-origin:center center;will-change:transform;display:inline-block;line-height:0}
#modal-img{display:block;max-width:92vw;max-height:80vh;border-radius:var(--radius);pointer-events:none;user-select:none}
.modal-dot{position:absolute;transform:translate(-50%,-100%);pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:3px}
.modal-dot .dot{width:12px;height:12px;border-radius:50%;background:var(--red);border:2px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.6);flex-shrink:0}
.modal-dot .dot.blue{background:var(--blue)}
.modal-dot .dot-label{background:rgba(20,20,20,.85);color:#fff;font-size:8px;font-weight:700;padding:2px 6px;border-radius:999px;white-space:nowrap;letter-spacing:.3px;box-shadow:0 1px 4px rgba(0,0,0,.5)}
.modal-hint{color:rgba(255,255,255,.7);font-size:11px;margin-top:8px;letter-spacing:.3px}
/* 編集シート */
.edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:flex-end;justify-content:center}
.edit-modal.open{display:flex}
.edit-sheet{background:var(--bg);border-radius:16px 16px 0 0;width:100%;max-width:440px;padding:20px 16px 36px;max-height:90vh;overflow-y:auto}
.edit-sheet-title{font-size:15px;font-weight:700;margin-bottom:14px;text-align:center}
/* カレンダー */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 12px;font-size:14px;cursor:pointer;color:var(--text2)}
.cal-title{font-size:15px;font-weight:700;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.cal-dow{background:var(--bg2);text-align:center;font-size:10px;font-weight:700;color:var(--text3);padding:5px 0}
.cal-dow.sun{color:#c04040}
.cal-dow.sat{color:#4060a0}
.cal-cell{background:#fff;min-height:72px;padding:3px;position:relative;cursor:pointer;transition:background .15s}
.cal-cell:hover{background:#fef8f4}
.cal-cell.other-month{background:var(--bg2)}
.cal-cell.today-cell{background:#fff8f6}
.cal-day{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:2px;line-height:1.2}
.cal-cell.today-cell .cal-day{color:var(--accent);font-weight:800}
.cal-cell.sun-cell .cal-day{color:#c04040}
.cal-cell.sat-cell .cal-day{color:#4060a0}
.cal-perf-dot{display:flex;align-items:center;gap:2px;font-size:9px;color:var(--text);margin-bottom:1px;line-height:1.3}
.cal-perf-dot .dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--border);border-top:1px solid var(--border)}
.cal-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:76px;padding:3px 2px;background:#fff;vertical-align:top}
.cal-cell.other-month{background:var(--bg2)}
.cal-cell.today-cell{background:#fff8f6}
.cal-run-inline{font-size:8px;font-weight:700;padding:1px 3px;line-height:1.5;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-bottom:1px;color:#fff}
/* 公演期間登録 */
.run-item{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab(0)">観劇予定</div>
    <div class="tab" onclick="switchTab(1)">座席表</div>
    <div class="tab" onclick="switchTab(2)">カレンダー</div>
    <div class="tab" onclick="switchTab(3)">登録</div>
  </div>
  <div class="pane active" id="pane0"><div class="loading">読み込み中...</div></div>
  <div class="pane" id="pane1"><div class="loading">読み込み中...</div></div>
  <div class="pane" id="pane2"><div class="loading">読み込み中...</div></div>
  <div class="pane" id="pane3"><div class="loading">読み込み中...</div></div>
</div>

<!-- 座席モーダル -->
<div class="modal-overlay" id="seat-modal">
  <button class="modal-close" onclick="closeSeatModal()">✕</button>
  <div class="pinch-container" id="pinch-container">
    <div id="modal-inner">
      <img id="modal-img" src="" alt="座席表">
      <div id="modal-dots"></div>
    </div>
  </div>
  <div class="modal-hint" id="modal-hint">ピンチで拡大 / 2本指でスクロール</div>
</div>

<!-- 編集シート -->
<div class="edit-modal" id="edit-modal">
  <div class="edit-sheet" id="edit-sheet">
    <div class="edit-sheet-title">編集</div>
    <div id="edit-form-body"></div>
    <button class="btn primary" id="edit-save-btn" style="margin-top:14px" onclick="saveEdit()">保存する</button>
    <button class="btn" style="margin-top:8px" onclick="closeEditModal()">キャンセル</button>
  </div>
</div>

<script>
// =============================================
// IndexedDB
// =============================================
const DB_NAME='TheaterAppDB', DB_VERSION=3;
let db=null;
const DEFAULT_THEATERS=[
  {id:'t_ginga',   name:'天王洲アイル 銀河劇場',      place:'東京・天王洲アイル', address:'〒140-0002 東京都品川区東品川2-1-3',url:''},
  {id:'t_stella',  name:'品川プリンス ステラボール',    place:'東京・品川',        address:'〒108-8611 東京都港区高輪4-10-30 品川プリンスホテル内',url:''},
  {id:'t_hika',    name:'シアターH',                  place:'東京・大井町',      address:'〒140-0012 東京都品川区勝島1-6-29',url:''},
  {id:'t_mbs',     name:'skyシアターMBS',              place:'大阪・難波',        address:'〒542-0076 大阪府大阪市中央区難波5-1-60 なんばスカイオ12F',url:''},
  {id:'t_tachi',   name:'立川ステージガーデン',         place:'東京・立川',        address:'〒190-0014 東京都立川市緑町3-1 GREEN SPRINGS W3棟',url:''},
  {id:'t_seinen',  name:'日本青年館ホール',             place:'東京・外苑前',      address:'〒160-0013 東京都新宿区霞ヶ丘町4-1',url:''},
  {id:'t_sun',     name:'サンシャイン劇場',             place:'東京・池袋',        address:'〒170-0013 東京都豊島区東池袋3-1-4 サンシャインシティ文化会館4F',url:''},
  {id:'t_aiia',    name:'AiiA 2.5 Theater Kobe',      place:'兵庫・神戸',        address:'〒651-0096 兵庫県神戸市中央区雲井通7-1-1 ミント神戸14F',url:''},
  {id:'t_sanmall', name:'シアターサンモール',           place:'東京・新宿',        address:'〒160-0022 東京都新宿区新宿3-14-20 サンモールビルB2F',url:''},
  {id:'t_zero',    name:'全労災ホール スペース・ゼロ',  place:'東京・新宿',        address:'〒151-0053 東京都渋谷区代々木2-12-10',url:''},
];
// カラーパレット（公演期間ごとに割り当て）
const RUN_COLORS=['#e87060','#6090d0','#60a870','#c070b0','#d0a040','#60b0b0','#9070d0','#d07040'];

function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VERSION);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('theaters'))    d.createObjectStore('theaters',{keyPath:'id'});
      if(!d.objectStoreNames.contains('performances')){const ps=d.createObjectStore('performances',{keyPath:'id'});ps.createIndex('datetime','datetime',{unique:false});}
      if(!d.objectStoreNames.contains('titles'))      d.createObjectStore('titles',{keyPath:'id',autoIncrement:true});
      if(!d.objectStoreNames.contains('images'))      d.createObjectStore('images',{keyPath:'theaterId'});
      if(!d.objectStoreNames.contains('runs'))        d.createObjectStore('runs',{keyPath:'id'}); // 公演期間
    };
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error);
  });
}
const dbGetAll=(s)=>new Promise((r,j)=>{const t=db.transaction(s,'readonly');const q=t.objectStore(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});
const dbPut=(s,o)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');const q=t.objectStore(s).put(o);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});
const dbDelete=(s,k)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');const q=t.objectStore(s).delete(k);q.onsuccess=()=>r();q.onerror=()=>j(q.error);});

// =============================================
// 状態
// =============================================
let theaters=[],performances=[],titles=[],images={},runs=[];
let showPast=false;
let filterTitle='',filterTheater='',filterMonth='',filterType='';
let checkedIds=new Set();
let memoCollapsed=JSON.parse(localStorage.getItem('memoCollapsed')||'false');
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();

async function initApp(){
  db=await openDB();
  const ex=await dbGetAll('theaters');
  if(ex.length===0){for(const t of DEFAULT_THEATERS)await dbPut('theaters',t);}
  else{
    const ids=ex.map(t=>t.id);
    for(const t of DEFAULT_THEATERS)if(!ids.includes(t.id))await dbPut('theaters',t);
    const h=ex.find(t=>t.id==='t_hika');
    if(h&&h.place!=='東京・大井町'){h.place='東京・大井町';h.address='〒140-0012 東京都品川区勝島1-6-29';await dbPut('theaters',h);}
  }
  const ts=await dbGetAll('titles');
  if(ts.length===0)await dbPut('titles',{id:1,name:'スキップとローファー ミュージカル'});
  await reloadAll();
  renderCurrentTab();
}
async function reloadAll(){
  theaters=await dbGetAll('theaters');
  performances=await dbGetAll('performances');
  const ts=await dbGetAll('titles');titles=ts.map(t=>t.name);
  const imgs=await dbGetAll('images');images={};imgs.forEach(i=>{images[i.theaterId]=i.dataUrl;});
  runs=await dbGetAll('runs');
}

// =============================================
// ユーティリティ
// =============================================
function fmtDt(iso){if(!iso)return '';const d=new Date(iso);const days=['日','月','火','水','木','金','土'];return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function fmtDate(iso){if(!iso)return '';const d=new Date(iso);return `${d.getMonth()+1}/${d.getDate()}`;}
function fmtTime(iso){if(!iso)return '';const d=new Date(iso);return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function fmtYM(iso){if(!iso)return '';const d=new Date(iso);return `${d.getFullYear()}年${d.getMonth()+1}月`;}
function dateKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function todayStart(){const d=new Date();d.setHours(0,0,0,0);return d;}
function tomorrowStart(){const d=todayStart();d.setDate(d.getDate()+1);return d;}
function dayAfterStart(){const d=todayStart();d.setDate(d.getDate()+2);return d;}
function isToday(iso){const d=new Date(iso);return d>=todayStart()&&d<tomorrowStart();}
function isTomorrow(iso){const d=new Date(iso);return d>=tomorrowStart()&&d<dayAfterStart();}
function isPast(iso){return new Date(iso)<todayStart();}
function getTheater(id){return theaters.find(t=>t.id===id)||{};}
function typeLabel(t){return {self:'自分用',companion:'連番用',duplicate:'重複分'}[t]||t;}
function typeBadge(t){return `<span class="badge ${t}">${typeLabel(t)}</span>`;}

// =============================================
// タブ
// =============================================
let currentTab=0;
function switchTab(i){
  currentTab=i;
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  document.querySelectorAll('.pane').forEach((p,j)=>p.classList.toggle('active',i===j));
  renderCurrentTab();
}
function renderCurrentTab(){
  if(currentTab===0)renderSchedule();
  if(currentTab===1)renderSeatView();
  if(currentTab===2)renderCalendar();
  if(currentTab===3)renderRegPage();
}

// =============================================
// TAB0: 観劇予定
// =============================================
function renderSchedule(){
  const el=document.getElementById('pane0');
  const hiddenPerfs=performances.filter(p=>p.hidden);
  const allTitles=[...new Set(performances.map(p=>p.title).filter(Boolean))];
  const allTheaters=[...new Set(performances.map(p=>p.theaterId))];
  const allMonths=[...new Set(performances.map(p=>fmtYM(p.datetime)).filter(Boolean))].sort();

  let visible=performances
    .filter(p=>!p.hidden)
    .filter(p=>showPast||!isPast(p.datetime))
    .filter(p=>!filterTitle||p.title===filterTitle)
    .filter(p=>!filterTheater||p.theaterId===filterTheater)
    .filter(p=>!filterMonth||fmtYM(p.datetime)===filterMonth)
    .filter(p=>!filterType||p.type===filterType)
    .sort((a,b)=>new Date(a.datetime)-new Date(b.datetime));

  let html='';

  // ▼ 絞り込みフィルタ
  html+=`<div class="filter-box">
    <div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:8px">🔍 絞り込み</div>
    <div class="grid2" style="margin-bottom:6px">
      <select style="font-size:12px;padding:6px 8px" onchange="filterTitle=this.value;renderSchedule()">
        <option value="">公演名</option>
        ${allTitles.map(t=>`<option value="${t}" ${filterTitle===t?'selected':''}>${t}</option>`).join('')}
      </select>
      <select style="font-size:12px;padding:6px 8px" onchange="filterTheater=this.value;renderSchedule()">
        <option value="">劇場</option>
        ${allTheaters.map(id=>{const th=getTheater(id);return `<option value="${id}" ${filterTheater===id?'selected':''}>${th.name}</option>`;}).join('')}
      </select>
    </div>
    <div class="grid2">
      <select style="font-size:12px;padding:6px 8px" onchange="filterMonth=this.value;renderSchedule()">
        <option value="">月</option>

  document.querySelectorAll('.bulk-cb').forEach(cb=>{

function buildScheduleCard(p){
  const th=getTheater(p.theaterId);
  const today=isToday(p.datetime),tmrw=isTomorrow(p.datetime),past=isPast(p.datetime);
  const cardCls=today?'card today-card':tmrw?'card tomorrow-card':'card';
  const whenBadge=today?'<span class="badge today">今日</span>':tmrw?'<span class="badge tomorrow">明日</span>':past?'<span class="badge past">終了</span>':'';
  const hStyle=today?'font-size:15px;font-weight:800;color:#b83020':tmrw?'font-size:14px;font-weight:700;color:#9a6810':'font-size:14px;font-weight:700';
  const img=images[p.theaterId];
  const seatBtn=img
    ?`<button class="btn seat-btn" style="margin-top:8px" onclick="openSingleSeatModal('${p.theaterId}','${p.rowLabel||''}','${p.seatNum||''}','${p.id}')">🎭 座席位置を確認する</button>`
    :`<button class="btn" style="margin-top:8px;font-size:12px;padding:6px;color:var(--text3)" disabled>🎭 座席表未登録</button>`;

  const memoHtml=memoCollapsed
    ?`<details style="margin-top:8px"><summary style="font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;list-style:none">▶ メモを表示</summary><textarea style="width:100%;padding:7px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-family:inherit;resize:vertical;min-height:44px;margin-top:4px" onchange="saveMemo('${p.id}',this.value)">${p.memo||''}</textarea></details>`
    :`<div style="margin-top:8px"><div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:3px">メモ</div><textarea style="width:100%;padding:7px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-family:inherit;resize:vertical;min-height:44px" onchange="saveMemo('${p.id}',this.value)">${p.memo||''}</textarea></div>`;

  return `<div class="${cardCls}">
    <div class="card-header">
      ${whenBadge}${typeBadge(p.type)}
      <span style="${hStyle}">${th.name||'不明'}</span>
      <button class="edit-btn" onclick="openEditModal('${p.id}')">✏️</button>
      <button class="hide-btn" onclick="toggleHidePerf('${p.id}')" title="非表示">🙈</button>
    </div>
    ${p.title?`<div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:5px">🎬 ${p.title}</div>`:''}
    <div class="info-row"><span class="info-label">日時</span>${fmtDt(p.datetime)}</div>
    <div class="info-row"><span class="info-label">場所</span>${th.place||'—'}</div>
    <div class="info-row"><span class="info-label">座席</span><strong>${p.rowLabel||''}列 ${p.seatNum||''}番</strong> × ${p.count}枚</div>
    ${seatBtn}
    ${memoHtml}
  </div>`;
}

// =============================================
// 日本祝日計算
// =============================================
function calcJpHolidays(year){
  const h=new Set();
  const add=(m,d)=>h.add(`${year}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  // 固定祝日
  add(1,1);add(2,11);add(2,23);add(4,29);add(5,3);add(5,4);add(5,5);
  add(8,11);add(11,3);add(11,23);
  // 成人の日(1月第2月曜)
  let d=new Date(year,0,1);while(d.getDay()!==1)d.setDate(d.getDate()+1);d.setDate(d.getDate()+7);add(1,d.getDate());
  // 海の日(7月第3月曜)
  d=new Date(year,6,1);while(d.getDay()!==1)d.setDate(d.getDate()+1);d.setDate(d.getDate()+14);add(7,d.getDate());
  // 敬老の日(9月第3月曜)
  d=new Date(year,8,1);while(d.getDay()!==1)d.setDate(d.getDate()+1);d.setDate(d.getDate()+14);add(9,d.getDate());
  // スポーツの日(10月第2月曜)
  d=new Date(year,9,1);while(d.getDay()!==1)d.setDate(d.getDate()+1);d.setDate(d.getDate()+7);add(10,d.getDate());
  // 春分(簡易計算)
  const spr=Math.floor(20.8431+0.242194*(year-1980)-Math.floor((year-1980)/4));
  add(3,spr);
  // 秋分(簡易計算)
  const aut=Math.floor(23.2488+0.242194*(year-1980)-Math.floor((year-1980)/4));
  add(9,aut);
  return h;
}

function renderCalendar(){
  const el=document.getElementById('pane2');
  const year=calYear, month=calMonth;
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const startDow=firstDay.getDay();
  const totalCells=Math.ceil((startDow+lastDay.getDate())/7)*7;
  const numWeeks=totalCells/7;

  // 公演をdateKeyでグルーピング（自分用のみ）
  const perfByDate={};
  performances.filter(p=>!p.hidden&&p.type==='self').forEach(p=>{
    const k=dateKey(new Date(p.datetime));
    if(!perfByDate[k])perfByDate[k]=[];
    perfByDate[k].push(p);
  });

  const todayKey=dateKey(new Date());
  const jpHolidays=calcJpHolidays(year);

  // セル情報を先に全部構築
  const cells=[];
  for(let i=0;i<totalCells;i++){
    const dayOffset=i-startDow;
    const d=new Date(year,month,1+dayOffset);
    const isCurrentMonth=d.getMonth()===month;
    const dk=dateKey(d);
    const dow=d.getDay();
    const isHoliday=isCurrentMonth&&jpHolidays.has(dk);
    cells.push({d,isCurrentMonth,dk,dow,isHoliday,isTodayCell:dk===todayKey});
  }

  // 週ごとに処理
  let html=`<div style="padding:16px">
    <div class="cal-header">
      <button class="cal-nav" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar()">＜</button>
      <div class="cal-title">${year}年 ${month+1}月</div>
      <button class="cal-nav" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar()">＞</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--border);border-top:1px solid var(--border)">
      <div class="cal-dow sun" style="border-right:1px solid var(--border);border-bottom:1px solid var(--border)">日</div>
      <div class="cal-dow" style="border-right:1px solid var(--border);border-bottom:1px solid var(--border)">月</div>
      <div class="cal-dow" style="border-right:1px solid var(--border);border-bottom:1px solid var(--border)">火</div>
      <div class="cal-dow" style="border-right:1px solid var(--border);border-bottom:1px solid var(--border)">水</div>
      <div class="cal-dow" style="border-right:1px solid var(--border);border-bottom:1px solid var(--border)">木</div>
      <div class="cal-dow" style="border-right:1px solid var(--border);border-bottom:1px solid var(--border)">金</div>
      <div class="cal-dow sat" style="border-right:1px solid var(--border);border-bottom:1px solid var(--border)">土</div>
    </div>`;

  // グリッド全セル描画（日付→帯→公演時間 の順）
  // 各セルにその日の run 情報を付与
  const cellRunMap={}; // dk -> [{color,label,isStart,isEnd,isRest}]
  cells.forEach(c=>{
    if(!c.isCurrentMonth)return;
    const arr=[];
    runs.forEach((r,ri)=>{
      const color=RUN_COLORS[ri%RUN_COLORS.length];
      const rStart=new Date(r.startDate);rStart.setHours(0,0,0,0);
      const rEnd=new Date(r.endDate);rEnd.setHours(23,59,59,999);
      if(c.d>=rStart&&c.d<=rEnd){
        const isRest=(r.restDays||[]).includes(c.dk);
        const isStart=dateKey(rStart)===c.dk;
        // 週頭(日曜)も見出し表示
        const isWeekStart=c.dow===0;
        const showTitle=isStart||isWeekStart;
        const label=showTitle?(r.title+(r.area?' ('+r.area+')':'')):'';
        arr.push({color,label,isRest,isStart,isWeekStart,ri});
      }
    });
    if(arr.length)cellRunMap[c.dk]=arr;
  });

  let gridHtml='<div class="cal-grid">';
  cells.forEach((c,i)=>{
    let cellCls='cal-cell';
    if(!c.isCurrentMonth)cellCls+=' other-month';
    if(c.isTodayCell)cellCls+=' today-cell';
    if(c.dow===0||c.isHoliday)cellCls+=' sun-cell';
    if(c.dow===6)cellCls+=' sat-cell';

    // 1. 日付
    const dayHtml=`<div class="cal-day">${c.isCurrentMonth?c.d.getDate():''}</div>`;

    // 2. 帯（日付の下）
    let barsHtml='';
    if(c.isCurrentMonth&&cellRunMap[c.dk]){
      cellRunMap[c.dk].forEach(rb=>{
        if(rb.isRest){
          barsHtml+=`<div style="font-size:8px;color:#4060c0;font-weight:700;padding:0 2px;line-height:1.6">休演日</div>`;
        } else {
          // 週末(土)は右角丸なし、週頭(日)は左角丸なし（ただし開始日は角丸あり）
          const rStart=new Date(runs[rb.ri].startDate);rStart.setHours(0,0,0,0);
          const rEnd=new Date(runs[rb.ri].endDate);rEnd.setHours(23,59,59,999);
          const isEnd=dateKey(rEnd)===c.dk;
          const rl=rb.isStart?'3px':'0';
          const rr=(isEnd||c.dow===6)?'3px':'0';
          barsHtml+=`<div class="cal-run-inline" style="background:${rb.color};border-radius:${rl} ${rr} ${rr} ${rl}">${rb.label}</div>`;
        }
      });
    }

    // 3. 公演ドット（帯の下）
    let dotsHtml='';
    if(c.isCurrentMonth&&perfByDate[c.dk]){
      perfByDate[c.dk].forEach(p=>{
        dotsHtml+=`<div class="cal-perf-dot"><span class="dot"></span><span>${fmtTime(p.datetime)}</span></div>`;
      });
    }

    gridHtml+=`<div class="${cellCls}">${dayHtml}${barsHtml}${dotsHtml}</div>`;
  });
  gridHtml+='</div>';

  html+=gridHtml+'</div>';

  // 公演期間一覧
  html+=`<div class="divider" style="margin-top:14px"></div>
    <div class="section-title">公演期間</div>`;
  if(runs.length){
    runs.forEach((r,i)=>{
      const color=RUN_COLORS[i%RUN_COLORS.length];
      const restLabel=(r.restDays&&r.restDays.length)?`<div style="font-size:10px;color:#4060c0;margin-top:1px">休演: ${r.restDays.join(', ')}</div>`:'';
      html+=`<div class="run-item" style="flex-wrap:wrap;align-items:flex-start">
        <span style="width:10px;height:10px;border-radius:2px;background:${color};flex-shrink:0;margin-top:2px"></span>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600">${r.title}${r.area?` <span style="font-weight:400;color:var(--text3)">／${r.area}</span>`:''}</div>
          <div style="font-size:11px;color:var(--text3)">${r.startDate}〜${r.endDate}</div>
          ${restLabel}
        </div>
        <button class="del-btn" onclick="deleteRun('${r.id}')">削除</button>
      </div>`;
    });
  } else {
    html+='<div style="font-size:13px;color:var(--text3);padding:4px 0">登録なし</div>';
  }

  // 公演期間登録フォーム
  const titleOpts='<option value="">タイトルを選択</option>'+titles.map(t=>`<option value="${t}">${t}</option>`).join('');
  html+=`<div class="divider"></div>
    <div class="section-title">公演期間を登録</div>
    <label class="field">公演タイトル *</label>

async function addRun(){

  const area=document.getElementById('run-area').value.trim();
  const startDate=document.getElementById('run-start').value;
  const endDate=document.getElementById('run-end').value;

async function addPerformance(){

function exportExcel(){if(!performances.length){alert('登録されている公演がありません');return;}const BOM='\uFEFF';const headers=['公演タイトル','劇場名','場所','住所','公演日時','列','番号','枚数','種別','非表示','メモ'];const rows=[...performances].sort((a,b)=>new Date(a.datetime)-new Date(b.datetime)).map(p=>{const th=getTheater(p.theaterId);return[p.title||'',th.name||'',th.place||'',th.address||'',fmtDt(p.datetime),p.rowLabel||'',p.seatNum||'',p.count,typeLabel(p.type),p.hidden?'非表示':'',(p.memo||'').replace(/\n/g,' ')].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');});const csv=BOM+[headers.join(','),...rows].join('\r\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='観劇記録.csv';a.click();URL.revokeObjectURL(url);}

// =============================================
// 座席計算
// =============================================
const GINGA_ROWS=['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O','P','Q'];
const GINGA_X={L:{start:9.5,end:34.0,seatFrom:1,seatTo:12},M:{start:38.0,end:63.0,seatFrom:13,seatTo:24},R:{start:67.5,end:92.0,seatFrom:25,seatTo:36}};
const GINGA_ROW_Y=[16.0,20.8,25.6,30.4,35.2,40.0,44.8,49.7,54.5,59.3,64.1,68.9,73.7,78.6,83.4,88.2,93.0];
function calcSeatPos(theaterId,rowLabel,seatNum){
  if(theaterId!=='t_ginga')return null;
  const rowIdx=GINGA_ROWS.indexOf(rowLabel);if(rowIdx<0)return null;
  const num=parseInt(seatNum);
  const yPct=GINGA_ROW_Y[rowIdx];
  let block;if(num<=12)block=GINGA_X.L;else if(num<=24)block=GINGA_X.M;else block=GINGA_X.R;
  const xPct=block.start+(num-block.seatFrom)/(block.seatTo-block.seatFrom)*(block.end-block.start);
  return{x:xPct,y:yPct};
}

// =============================================
// ピンチズーム
// =============================================
let pinchState={scale:1,lastScale:1,startDist:0,tx:0,ty:0,lastTx:0,lastTy:0,startMx:0,startMy:0};
function openSingleSeatModal(theaterId,rowLabel,seatNum,perfId){
  const img=images[theaterId];if(!img)return;
  document.getElementById('modal-img').src=img;
  const dots=document.getElementById('modal-dots');dots.innerHTML='';
  const pos=calcSeatPos(theaterId,rowLabel,seatNum);
  if(pos){
    const p=performances.find(x=>x.id===perfId)||{};
    const isBlue=(p.type==='companion'||p.type==='duplicate');
    const dot=document.createElement('div');dot.className='modal-dot';
    dot.style.left=pos.x+'%';dot.style.top=pos.y+'%';
    dot.innerHTML=`<div class="dot${isBlue?' blue':''}"></div>`;
    dots.appendChild(dot);
  }
  document.getElementById('modal-hint').textContent='ピンチで拡大 / 2本指でスクロール';
  resetPinch();document.getElementById('seat-modal').classList.add('open');initPinch();
}
function openBulkSeatModal(){
  // DOM上のチェック状態をcheckedIdsに同期
  checkedIds=new Set();
  document.querySelectorAll('.bulk-cb:checked').forEach(cb=>checkedIds.add(cb.dataset.pid));
  if(checkedIds.size===0){alert('公演を選択してください');return;}
  const selected=performances.filter(p=>checkedIds.has(p.id));
  if(!selected.length)return;
  const theaterId=selected[0].theaterId;
  const img=images[theaterId];
  if(!img){alert('選択した公演の劇場に座席表画像が登録されていません');return;}
  document.getElementById('modal-img').src=img;
  const dots=document.getElementById('modal-dots');dots.innerHTML='';
  selected.forEach(p=>{
    if(p.theaterId!==theaterId)return;
    const pos=calcSeatPos(p.theaterId,p.rowLabel,p.seatNum);
    if(pos){
      const isBlue=(p.type==='companion'||p.type==='duplicate');
      const dot=document.createElement('div');dot.className='modal-dot';
      dot.style.left=pos.x+'%';dot.style.top=pos.y+'%';
      dot.innerHTML=`<div class="dot-label">${fmtDate(p.datetime)}</div><div class="dot${isBlue?' blue':''}"></div>`;
      dots.appendChild(dot);
    }
  });
  document.getElementById('modal-hint').textContent='ピンチで拡大 ／ 異なる劇場は非表示';
  resetPinch();document.getElementById('seat-modal').classList.add('open');initPinch();
}
function openImgModal(theaterId){
  const img=images[theaterId];if(!img)return;
  document.getElementById('modal-img').src=img;
  document.getElementById('modal-dots').innerHTML='';
  document.getElementById('modal-hint').textContent='ピンチで拡大 / 2本指でスクロール';
  resetPinch();document.getElementById('seat-modal').classList.add('open');initPinch();
}
function closeSeatModal(){document.getElementById('seat-modal').classList.remove('open');resetPinch();}
function resetPinch(){pinchState={scale:1,lastScale:1,startDist:0,tx:0,ty:0,lastTx:0,lastTy:0,startMx:0,startMy:0};applyTransform();}
function applyTransform(){document.getElementById('modal-inner').style.transform=`translate(${pinchState.tx}px,${pinchState.ty}px) scale(${pinchState.scale})`;}
function getDist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}
function getMid(t){return{x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2};}
function initPinch(){
  const pc=document.getElementById('pinch-container');
  pc.ontouchstart=e=>{
    if(e.touches.length===2){e.preventDefault();pinchState.startDist=getDist(e.touches);pinchState.lastScale=pinchState.scale;const m=getMid(e.touches);pinchState.startMx=m.x;pinchState.startMy=m.y;pinchState.lastTx=pinchState.tx;pinchState.lastTy=pinchState.ty;}
    else if(e.touches.length===1){pinchState.startMx=e.touches[0].clientX-pinchState.tx;pinchState.startMy=e.touches[0].clientY-pinchState.ty;}
  };
  pc.ontouchmove=e=>{
    e.preventDefault();
    if(e.touches.length===2){const dist=getDist(e.touches);pinchState.scale=Math.min(5,Math.max(1,pinchState.lastScale*(dist/pinchState.startDist)));const m=getMid(e.touches);pinchState.tx=pinchState.lastTx+(m.x-pinchState.startMx);pinchState.ty=pinchState.lastTy+(m.y-pinchState.startMy);applyTransform();}
    else if(e.touches.length===1&&pinchState.scale>1){pinchState.tx=e.touches[0].clientX-pinchState.startMx;pinchState.ty=e.touches[0].clientY-pinchState.startMy;applyTransform();}
  };
  pc.ontouchend=e=>{if(e.touches.length<2&&pinchState.scale<1.05)resetPinch();};
  let lastTap=0;pc.onclick=e=>{const now=Date.now();if(now-lastTap<300)resetPinch();lastTap=now;};
}
document.getElementById('seat-modal').addEventListener('click',e=>{if(e.target.id==='seat-modal')closeSeatModal();});

// =============================================
// 起動
// =============================================
initApp().catch(err=>{document.getElementById('pane0').innerHTML=`<div class="empty">初期化エラー: ${err.message}</div>`;});
</script>
