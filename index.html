<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>観劇管理</title>
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="観劇管理">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf7f2;--bg2:#f2ede5;--bg3:#e8e0d4;
  --border:#d4c8b8;--border2:#c0b09a;
  --text:#3a2e22;--text2:#6a5a48;--text3:#9a8a78;
  --accent:#c97060;--accent2:#e8907a;
  --blue:#6090c0;--red:#d04040;
  --radius:10px;--radius-sm:6px;
  --shadow:0 2px 8px rgba(0,0,0,0.08);
}
body{font-family:"Hiragino Kaku Gothic Pro","Meiryo",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:440px;margin:0 auto;padding-bottom:80px}
.tab-bar{display:flex;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.tab{flex:1;padding:12px 2px;font-size:11px;font-weight:600;text-align:center;color:var(--text3);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;letter-spacing:.3px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.pane{display:none;padding:16px}
.pane.active{display:block}
.section-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;letter-spacing:.5px}
.subsection{font-size:11px;font-weight:700;color:var(--text3);margin:14px 0 6px;letter-spacing:.8px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:10px;box-shadow:var(--shadow)}
.card.today-card{border:2px solid #e06050;background:#fffaf9;box-shadow:0 3px 12px rgba(192,64,48,.15)}
.card.tomorrow-card{border:1.5px solid #d4a840;background:#fffdf5;box-shadow:0 2px 8px rgba(180,130,0,.1)}
.card-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px}
.badge.today{background:#fde0d8;color:#b83020}
.badge.tomorrow{background:#fef0c8;color:#9a6810}
.badge.self{background:#ffe0e0;color:var(--red)}
.badge.companion{background:#e0f0e0;color:#408040}
.badge.duplicate{background:#e8e0f0;color:#6040a0}
.badge.past{background:#e8e8e8;color:#888}
.badge.hidden-b{background:#f0e8f8;color:#804898}
label.field{display:block;font-size:11px;font-weight:600;color:var(--text2);margin:10px 0 4px;letter-spacing:.3px}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;color:var(--text);background:#fff;transition:border .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:56px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.btn{display:block;width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--text);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;text-align:center;margin-top:10px;transition:all .2s}
.btn:hover{background:var(--bg2)}
.btn.primary{background:var(--accent);color:#fff;border:none}
.btn.primary:hover{background:var(--accent2)}
.btn.sm{padding:5px 11px;font-size:12px;width:auto;margin-top:0}
.btn.xs{padding:3px 8px;font-size:11px;width:auto;margin-top:0}
.btn.danger{color:var(--red);border-color:#f0c0c0;background:#fff8f8}
.btn.excel{background:#1d6f42;color:#fff;border:none}
.btn.excel:hover{background:#2a8a52}
.btn.seat-btn{background:var(--blue);color:#fff;border:none;font-size:12px;padding:7px}
.btn.bulk-btn{background:#8060b0;color:#fff;border:none;font-size:12px;padding:8px}
.row-flex{display:flex;align-items:center;gap:8px}
.divider{height:1px;background:var(--border);margin:14px 0}
.chips-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{display:inline-flex;align-items:center;padding:5px 11px;border:1px solid var(--border);border-radius:999px;font-size:12px;cursor:pointer;background:#fff;color:var(--text2);transition:all .2s}
.chip.selected{background:var(--text);color:#fff;border-color:var(--text)}
.check-group{display:flex;gap:14px;flex-wrap:wrap;padding:6px 0}
.check-item{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px}
.check-item input[type=radio]{width:15px;height:15px;cursor:pointer;accent-color:var(--accent)}
/* 座席コンテナ */
.seat-container{position:relative;width:100%;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:var(--bg2);min-height:150px}
.seat-img{width:100%;display:block;cursor:zoom-in}
.seat-marker{position:absolute;transform:translate(-50%,-50%);border-radius:50%;border:1.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);z-index:5;pointer-events:none;background:var(--red);width:10px;height:10px}
.info-row{display:flex;gap:6px;font-size:13px;margin:3px 0;align-items:flex-start}
.info-label{font-size:11px;font-weight:600;color:var(--text3);min-width:54px;padding-top:1px}
.del-btn{font-size:11px;color:var(--red);cursor:pointer;background:none;border:none;padding:2px 5px;font-family:inherit;flex-shrink:0}
.hide-btn{font-size:11px;color:#804898;cursor:pointer;background:none;border:none;padding:2px 5px;font-family:inherit;flex-shrink:0}
.edit-btn{font-size:11px;color:var(--blue);cursor:pointer;background:none;border:none;padding:2px 5px;font-family:inherit;flex-shrink:0}
.upload-area{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:13px;text-align:center;font-size:13px;color:var(--text3);cursor:pointer;transition:all .2s}
.upload-area:hover{background:var(--bg2);border-color:var(--accent)}
.empty{text-align:center;padding:2rem 1rem;color:var(--text3);font-size:13px}
.loading{text-align:center;padding:2rem;color:var(--text3);font-size:13px}
/* フィルタ */
.filter-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:12px}
/* モーダル（拡大・座席確認） */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;flex-direction:column;align-items:center;justify-content:center;touch-action:none}
.modal-overlay.open{display:flex}
.modal-close{position:fixed;top:14px;right:16px;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:22px;cursor:pointer;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;z-index:1002;touch-action:manipulation}
/* ピンチズーム対応コンテナ */
.pinch-container{position:relative;overflow:hidden;width:92vw;max-height:80vh;display:flex;align-items:center;justify-content:center;border-radius:var(--radius)}
#modal-inner{position:relative;transform-origin:center center;will-change:transform;display:inline-block;line-height:0}
#modal-img{display:block;max-width:92vw;max-height:80vh;border-radius:var(--radius);pointer-events:none;user-select:none}
.modal-dot{position:absolute;transform:translate(-50%,-100%);pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:2px}
.modal-dot .dot{width:14px;height:14px;border-radius:50%;background:var(--red);border:2px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.5)}
.modal-dot .dot-label{background:rgba(0,0,0,.65);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:999px;white-space:nowrap;max-width:60px;overflow:hidden;text-overflow:ellipsis}
.modal-hint{color:rgba(255,255,255,.7);font-size:11px;margin-top:8px;letter-spacing:.3px}
/* 編集モーダル */
.edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:flex-end;justify-content:center}
.edit-modal.open{display:flex}
.edit-sheet{background:var(--bg);border-radius:16px 16px 0 0;width:100%;max-width:440px;padding:20px 16px 36px;max-height:90vh;overflow-y:auto}
.edit-sheet-title{font-size:15px;font-weight:700;margin-bottom:14px;text-align:center}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab(0)">観劇予定</div>
    <div class="tab" onclick="switchTab(1)">座席表</div>
    <div class="tab" onclick="switchTab(2)">登録</div>
  </div>
  <div class="pane active" id="pane0"><div class="loading">読み込み中...</div></div>
  <div class="pane" id="pane1"><div class="loading">読み込み中...</div></div>
  <div class="pane" id="pane2"><div class="loading">読み込み中...</div></div>
</div>

<!-- 座席拡大・一括座席確認モーダル -->
<div class="modal-overlay" id="seat-modal">
  <button class="modal-close" onclick="closeSeatModal()">✕</button>
  <div class="pinch-container" id="pinch-container">
    <div id="modal-inner">
      <img id="modal-img" src="" alt="座席表">
      <div id="modal-dots"></div>
    </div>
  </div>
  <div class="modal-hint" id="modal-hint">ピンチで拡大 / 2本指でスクロール</div>
</div>

<!-- 編集シート -->
<div class="edit-modal" id="edit-modal">
  <div class="edit-sheet" id="edit-sheet">
    <div class="edit-sheet-title">公演を編集</div>
    <div id="edit-form-body"></div>
    <button class="btn primary" style="margin-top:14px" onclick="saveEdit()">保存する</button>
    <button class="btn" style="margin-top:8px" onclick="closeEditModal()">キャンセル</button>
  </div>
</div>

<script>
// =============================================
// IndexedDB
// =============================================
const DB_NAME='TheaterAppDB', DB_VERSION=2;
let db=null;
const DEFAULT_THEATERS=[
  {id:'t_ginga',   name:'天王洲アイル 銀河劇場',      place:'東京・天王洲アイル', address:'〒140-0002 東京都品川区東品川2-1-3'},
  {id:'t_stella',  name:'品川プリンス ステラボール',    place:'東京・品川',        address:'〒108-8611 東京都港区高輪4-10-30 品川プリンスホテル内'},
  {id:'t_hika',    name:'シアターH',                  place:'東京・大井町',      address:'〒140-0012 東京都品川区勝島1-6-29'},
  {id:'t_mbs',     name:'skyシアターMBS',              place:'大阪・難波',        address:'〒542-0076 大阪府大阪市中央区難波5-1-60 なんばスカイオ12F'},
  {id:'t_tachi',   name:'立川ステージガーデン',         place:'東京・立川',        address:'〒190-0014 東京都立川市緑町3-1 GREEN SPRINGS W3棟'},
  {id:'t_seinen',  name:'日本青年館ホール',             place:'東京・外苑前',      address:'〒160-0013 東京都新宿区霞ヶ丘町4-1'},
  {id:'t_sun',     name:'サンシャイン劇場',             place:'東京・池袋',        address:'〒170-0013 東京都豊島区東池袋3-1-4 サンシャインシティ文化会館4F'},
  {id:'t_aiia',    name:'AiiA 2.5 Theater Kobe',      place:'兵庫・神戸',        address:'〒651-0096 兵庫県神戸市中央区雲井通7-1-1 ミント神戸14F'},
  {id:'t_sanmall', name:'シアターサンモール',           place:'東京・新宿',        address:'〒160-0022 東京都新宿区新宿3-14-20 サンモールビルB2F'},
  {id:'t_zero',    name:'全労災ホール スペース・ゼロ',  place:'東京・新宿',        address:'〒151-0053 東京都渋谷区代々木2-12-10'},
];
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VERSION);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('theaters'))    d.createObjectStore('theaters',{keyPath:'id'});
      if(!d.objectStoreNames.contains('performances')){const ps=d.createObjectStore('performances',{keyPath:'id'});ps.createIndex('datetime','datetime',{unique:false});}
      if(!d.objectStoreNames.contains('titles'))      d.createObjectStore('titles',{keyPath:'id',autoIncrement:true});
      if(!d.objectStoreNames.contains('images'))      d.createObjectStore('images',{keyPath:'theaterId'});
    };
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error);
  });
}
const dbGetAll=(s)=>new Promise((r,j)=>{const t=db.transaction(s,'readonly');const q=t.objectStore(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});
const dbPut=(s,o)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');const q=t.objectStore(s).put(o);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});
const dbDelete=(s,k)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');const q=t.objectStore(s).delete(k);q.onsuccess=()=>r();q.onerror=()=>j(q.error);});

// =============================================
// 状態
// =============================================
let theaters=[],performances=[],titles=[],images={};
let showPast=false;
// フィルタ状態
let filterTitle='',filterTheater='',filterMonth='';
// 一括チェック状態
let checkedIds=new Set();

async function initApp(){
  db=await openDB();
  const ex=await dbGetAll('theaters');
  if(ex.length===0){for(const t of DEFAULT_THEATERS)await dbPut('theaters',t);}
  else{
    const ids=ex.map(t=>t.id);
    for(const t of DEFAULT_THEATERS)if(!ids.includes(t.id))await dbPut('theaters',t);
    const h=ex.find(t=>t.id==='t_hika');
    if(h&&h.place!=='東京・大井町'){h.place='東京・大井町';h.address='〒140-0012 東京都品川区勝島1-6-29';await dbPut('theaters',h);}
  }
  const ts=await dbGetAll('titles');
  if(ts.length===0)await dbPut('titles',{id:1,name:'スキップとローファー ミュージカル'});
  await reloadAll();
  renderCurrentTab();
}
async function reloadAll(){
  theaters=await dbGetAll('theaters');
  performances=await dbGetAll('performances');
  const ts=await dbGetAll('titles');titles=ts.map(t=>t.name);
  const imgs=await dbGetAll('images');images={};imgs.forEach(i=>{images[i.theaterId]=i.dataUrl;});
}

// =============================================
// ユーティリティ
// =============================================
function fmtDt(iso){if(!iso)return '';const d=new Date(iso);const days=['日','月','火','水','木','金','土'];return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function fmtDate(iso){if(!iso)return '';const d=new Date(iso);return `${d.getMonth()+1}/${d.getDate()}`;}
function fmtYM(iso){if(!iso)return '';const d=new Date(iso);return `${d.getFullYear()}年${d.getMonth()+1}月`;}
function todayStart(){const d=new Date();d.setHours(0,0,0,0);return d;}
function tomorrowStart(){const d=todayStart();d.setDate(d.getDate()+1);return d;}
function dayAfterStart(){const d=todayStart();d.setDate(d.getDate()+2);return d;}
function isToday(iso){const d=new Date(iso);return d>=todayStart()&&d<tomorrowStart();}
function isTomorrow(iso){const d=new Date(iso);return d>=tomorrowStart()&&d<dayAfterStart();}
function isPast(iso){return new Date(iso)<todayStart();}
function getTheater(id){return theaters.find(t=>t.id===id)||{};}
function typeLabel(t){return {self:'自分用',companion:'連番用',duplicate:'重複分'}[t]||t;}
function typeBadge(t){return `<span class="badge ${t}">${typeLabel(t)}</span>`;}

// =============================================
// タブ
// =============================================
let currentTab=0;
function switchTab(i){
  currentTab=i;
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  document.querySelectorAll('.pane').forEach((p,j)=>p.classList.toggle('active',i===j));
  renderCurrentTab();
}
function renderCurrentTab(){
  if(currentTab===0)renderSchedule();
  if(currentTab===1)renderSeatView();
  if(currentTab===2)renderRegPage();
}

// =============================================
// TAB1: 観劇予定
// =============================================
function renderSchedule(){
  const el=document.getElementById('pane0');
  const hiddenPerfs=performances.filter(p=>p.hidden);

  // 絞り込み用の選択肢
  const allTitles=[...new Set(performances.map(p=>p.title).filter(Boolean))];
  const allTheaters=[...new Set(performances.map(p=>p.theaterId))];
  const allMonths=[...new Set(performances.map(p=>fmtYM(p.datetime)).filter(Boolean))].sort();

  let visible=performances
    .filter(p=>!p.hidden)
    .filter(p=>showPast||!isPast(p.datetime))
    .filter(p=>!filterTitle||p.title===filterTitle)
    .filter(p=>!filterTheater||p.theaterId===filterTheater)
    .filter(p=>!filterMonth||fmtYM(p.datetime)===filterMonth)
    .sort((a,b)=>new Date(a.datetime)-new Date(b.datetime));

  let html='';

  // ▼ 絞り込みフィルタ
  html+=`<div class="filter-box" style="margin-bottom:10px">
    <div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:8px">🔍 絞り込み</div>
    <div class="grid3">
      <div>
        <select style="font-size:12px;padding:6px 8px" onchange="filterTitle=this.value;renderSchedule()">
          <option value="">公演名</option>
          ${allTitles.map(t=>`<option value="${t}" ${filterTitle===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div>
        <select style="font-size:12px;padding:6px 8px" onchange="filterTheater=this.value;renderSchedule()">
          <option value="">劇場</option>
          ${allTheaters.map(id=>{const th=getTheater(id);return `<option value="${id}" ${filterTheater===id?'selected':''}>${th.name}</option>`;}).join('')}
        </select>
      </div>
      <div>
        <select style="font-size:12px;padding:6px 8px" onchange="filterMonth=this.value;renderSchedule()">
          <option value="">月</option>
          ${allMonths.map(m=>`<option value="${m}" ${filterMonth===m?'selected':''}>${m}</option>`).join('')}
        </select>
      </div>
    </div>
    ${(filterTitle||filterTheater||filterMonth)?`<button class="btn xs" style="margin-top:8px;color:var(--text2)" onclick="filterTitle='';filterTheater='';filterMonth='';renderSchedule()">✕ フィルタをクリア</button>`:''}
  </div>`;

  // ▼ 表示オプション（終了・非表示）
  html+=`<details style="margin-bottom:10px">
    <summary style="list-style:none;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px">
      ⚙️ 表示オプション
    </summary>
    <div style="background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);padding:10px 12px">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;margin-bottom:8px">
        <input type="checkbox" ${showPast?'checked':''} onchange="showPast=this.checked;renderSchedule()" style="width:16px;height:16px;accent-color:var(--accent)">
        終了した公演を表示する
      </label>
      <div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px">非表示の公演</div>
      ${hiddenPerfs.length
        ? hiddenPerfs.map(p=>{const th=getTheater(p.theaterId);return `<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;flex:1;color:var(--text2)">${th.name} ${fmtDate(p.datetime)} ${p.rowLabel||''}列${p.seatNum||''}番</span><button class="btn xs" onclick="toggleHidePerf('${p.id}')">再表示</button></div>`;}).join('')
        : '<div style="font-size:12px;color:var(--text3)">なし</div>'}
    </div>
  </details>`;

  // ▼ 一括座席確認パネル
  const bulkable=visible.filter(p=>images[p.theaterId]);
  if(bulkable.length>0){
    html+=`<div class="filter-box" style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:8px">🗺️ 一括座席位置確認</div>
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <button class="btn xs" onclick="checkAllBulk(${JSON.stringify(bulkable.map(p=>p.id))})">全選択</button>
        <button class="btn xs" onclick="checkedIds=new Set();renderSchedule()">全解除</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:8px">
        ${bulkable.map(p=>{
          const th=getTheater(p.theaterId);
          return `<label style="display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer">
            <input type="checkbox" ${checkedIds.has(p.id)?'checked':''} onchange="toggleCheck('${p.id}')" style="width:15px;height:15px;accent-color:#8060b0">

// =============================================
// 座席位置計算（銀河劇場）
// ブロックごとに独立してX座標を計算（通路ずれ対策）
// =============================================
const GINGA_ROWS=['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O','P','Q'];
// 画像を直接ピクセル計測した実測値
const GINGA_X={
  L:{start:9.5, end:34.0, seatFrom:1,  seatTo:12}, // 青ブロック 1〜12番
  M:{start:38.0,end:63.0, seatFrom:13, seatTo:24}, // 緑ブロック 13〜24番
  R:{start:67.5,end:92.0, seatFrom:25, seatTo:36}, // 紫ブロック 25〜36番
};
// 各行Y座標（実測値・等間隔64px/1329px≒4.8%）
const GINGA_ROW_Y=[16.0,20.8,25.6,30.4,35.2,40.0,44.8,49.7,54.5,59.3,64.1,68.9,73.7,78.6,83.4,88.2,93.0];
function calcSeatPos(theaterId,rowLabel,seatNum){
  if(theaterId!=='t_ginga')return null;
  const rowIdx=GINGA_ROWS.indexOf(rowLabel);
  if(rowIdx<0)return null;
  const num=parseInt(seatNum);
  const yPct=GINGA_ROW_Y[rowIdx];
  let block;
  if(num<=12)block=GINGA_X.L;
  else if(num<=24)block=GINGA_X.M;
  else block=GINGA_X.R;
  const xPct=block.start+(num-block.seatFrom)/(block.seatTo-block.seatFrom)*(block.end-block.start);
  return{x:xPct,y:yPct};
}

// 座席モーダル（ピンチズーム対応）
// =============================================
let pinchState={scale:1,lastScale:1,startDist:0,tx:0,ty:0,lastTx:0,lastTy:0,startMx:0,startMy:0};

function resetPinch(){
  pinchState={scale:1,lastScale:1,startDist:0,tx:0,ty:0,lastTx:0,lastTy:0,startMx:0,startMy:0};
  applyTransform();
}
function applyTransform(){
  const el=document.getElementById('modal-inner');
  el.style.transform=`translate(${pinchState.tx}px,${pinchState.ty}px) scale(${pinchState.scale})`;
}
function getDist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}
function getMid(t){return{x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2};}

function initPinch(){
  const pc=document.getElementById('pinch-container');
  pc.ontouchstart=e=>{
    if(e.touches.length===2){
      e.preventDefault();
      pinchState.startDist=getDist(e.touches);
      pinchState.lastScale=pinchState.scale;
      const m=getMid(e.touches);
      pinchState.startMx=m.x; pinchState.startMy=m.y;
      pinchState.lastTx=pinchState.tx; pinchState.lastTy=pinchState.ty;
    } else if(e.touches.length===1){
      pinchState.startMx=e.touches[0].clientX-pinchState.tx;
      pinchState.startMy=e.touches[0].clientY-pinchState.ty;
    }
  };
  pc.ontouchmove=e=>{
    e.preventDefault();
    if(e.touches.length===2){
      const dist=getDist(e.touches);
      const newScale=Math.min(5,Math.max(1,pinchState.lastScale*(dist/pinchState.startDist)));
      pinchState.scale=newScale;
      const m=getMid(e.touches);
      pinchState.tx=pinchState.lastTx+(m.x-pinchState.startMx);
      pinchState.ty=pinchState.lastTy+(m.y-pinchState.startMy);
      applyTransform();
    } else if(e.touches.length===1&&pinchState.scale>1){
      pinchState.tx=e.touches[0].clientX-pinchState.startMx;
      pinchState.ty=e.touches[0].clientY-pinchState.startMy;
      applyTransform();
    }
  };
  pc.ontouchend=e=>{
    if(e.touches.length<2&&pinchState.scale<1.05){resetPinch();}
  };
  // ダブルタップでリセット
  let lastTap=0;
  pc.onclick=e=>{
    const now=Date.now();
    if(now-lastTap<300){resetPinch();}
    lastTap=now;
  };
}

    <input type="file" id="th-img-new" accept="image/*" style="display:none" onchange="previewImgNew(this)">
    <img id="img-preview-new" style="display:none;width:100%;border-radius:var(--radius);margin-top:8px;border:1px solid var(--border)">
    <button class="btn" onclick="addTheater()">劇場を追加</button>
    <div class="divider"></div>
    <div class="section-title">登録済み公演一覧</div>${perfListHtml}
  </div>`;
}
function showAddTitle(){document.getElementById('add-title-form').style.display='block';}
function hideAddTitle(){document.getElementById('add-title-form').style.display='none';document.getElementById('new-title-input').value='';}
async function saveTitle(){const val=document.getElementById('new-title-input').value.trim();if(!val)return;if(titles.includes(val)){alert('すでに登録されています');return;}await dbPut('titles',{id:Date.now(),name:val});await reloadAll();hideAddTitle();renderRegPage();}
async function deleteTitle(idx){if(!confirm('このタイトルを削除しますか？'))return;const ts=await dbGetAll('titles');if(ts[idx])await dbDelete('titles',ts[idx].id);await reloadAll();renderRegPage();}
async function addPerformance(){
  const title=document.getElementById('reg-title').value;
  const tid=document.getElementById('reg-theater').value;
  const dt=document.getElementById('reg-datetime').value;
  const rowLabel=document.getElementById('reg-row').value;
  const seatNum=document.getElementById('reg-num').value;
  const count=parseInt(document.getElementById('reg-count').value)||1;
  const type=document.querySelector('input[name="ttype"]:checked')?.value||'self';
  const memo=document.getElementById('reg-memo').value;
  if(!tid||!dt||!rowLabel||!seatNum){alert('劇場・日時・列・番号は必須です');return;}
  await dbPut('performances',{id:'p'+Date.now(),title,theaterId:tid,datetime:dt,rowLabel,seatNum,count,type,memo,hidden:false});
  await reloadAll();renderRegPage();alert('登録しました！');
}
async function deletePerf(id){if(!confirm('この公演を削除しますか？'))return;await dbDelete('performances',id);await reloadAll();renderRegPage();}
let pendingImgDataUrl=null;
function previewImgNew(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{pendingImgDataUrl=e.target.result;const prev=document.getElementById('img-preview-new');prev.src=pendingImgDataUrl;prev.style.display='block';document.getElementById('img-label-new').textContent='✓ '+file.name;};reader.readAsDataURL(file);}
async function addTheater(){const name=document.getElementById('th-name').value.trim();const place=document.getElementById('th-place').value.trim();const address=document.getElementById('th-address').value.trim();if(!name){alert('劇場名を入力してください');return;}if(theaters.find(t=>t.name===name)){alert('同名の劇場がすでに登録されています');return;}const id='t'+Date.now();await dbPut('theaters',{id,name,place,address});if(pendingImgDataUrl)await dbPut('images',{theaterId:id,dataUrl:pendingImgDataUrl});await reloadAll();pendingImgDataUrl=null;renderRegPage();alert(`「${name}」を登録しました！`);}
function exportExcel(){if(!performances.length){alert('登録されている公演がありません');return;}const BOM='\uFEFF';const headers=['公演タイトル','劇場名','場所','住所','公演日時','列','番号','枚数','種別','非表示','メモ'];const rows=[...performances].sort((a,b)=>new Date(a.datetime)-new Date(b.datetime)).map(p=>{const th=getTheater(p.theaterId);return[p.title||'',th.name||'',th.place||'',th.address||'',fmtDt(p.datetime),p.rowLabel||'',p.seatNum||'',p.count,typeLabel(p.type),p.hidden?'非表示':'',(p.memo||'').replace(/\n/g,' ')].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');});const csv=BOM+[headers.join(','),...rows].join('\r\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='観劇記録.csv';a.click();URL.revokeObjectURL(url);}

// =============================================
// 起動
// =============================================
initApp().catch(err=>{document.getElementById('pane0').innerHTML=`<div class="empty">初期化エラー: ${err.message}</div>`;});
</script>
</body>
</html>
